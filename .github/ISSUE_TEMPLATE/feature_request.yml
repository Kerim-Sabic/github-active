name: Feature request
description: Suggest a product or engineering improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product UI
        - GitHub auth
        - Scheduler
        - Content generation
        - Deployment
        - Achievement Lab
        - Documentation
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety fit
      options:
        - label: This does not require fake stars, fake achievements, spam, or deceptive contribution claims.
          required: true
